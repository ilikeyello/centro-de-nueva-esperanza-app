<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Send a valid Referer so YouTube embeds don't fail with "error 153"
         (YouTube's late-2025 policy rejects embeds with no/empty Referer). -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>CNE</title>
    <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0E1A0B" media="(prefers-color-scheme: dark)" />
    <meta name="msapplication-TileColor" content="#dc2626" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/apple-touch-icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/apple-touch-icon-512x512.png" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- PWA Manifest for Android -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CNE App" />
    
    <!-- Android fixes -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="CNE App" />
    
    
    <!-- Safe area insets for notched devices -->
    <style>
      /* Core styles */
      * {
        box-sizing: border-box;
      }
      
      html {
        height: 100%;
        -webkit-text-size-adjust: 100%;
        color-scheme: light dark;
        background-color: #FAF9F6;
        overscroll-behavior: none;
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        min-height: 100dvh;
        background-color: #FAF9F6;
        overflow-x: hidden;
        overscroll-behavior: none;
      }

      /* Dark mode body - matches .dark --background */
      @media (prefers-color-scheme: dark) {
        html, body {
          background-color: #0E1A0B;
        }
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh;
        background-color: inherit;
        /* Safe area padding is handled by AppInner so the warm gradient
           covers the status-bar and home-indicator regions seamlessly */
      }

      .dark .app-splash-logo {
        filter: brightness(0) invert(1);
      }
    </style>
    <script>
      // Apply .dark class immediately so CSS variables resolve before first paint
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Static splash shown instantly while JS loads -->
      <div id="static-splash">
        <img src="/cne_logo_transparent.png" alt="Centro de Nueva Esperanza" />
        <div class="spinner"></div>
      </div>
      <style>
        #static-splash {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 1.5rem;
          background-color: #FFFFFF;
          z-index: 9999;
        }
        #static-splash img {
          width: 180px;
          height: auto;
          max-width: 80%;
        }
        #static-splash .spinner {
          width: 2.5rem;
          height: 2.5rem;
          border-radius: 9999px;
          border: 2.5px solid rgba(0, 0, 0, 0.05);
          border-top-color: #3B6D11;
          animation: splash-spin .9s linear infinite;
        }
        @keyframes splash-spin {
          to { transform: rotate(360deg); }
        }
        .dark #static-splash {
          background-color: #0E1A0B;
        }
        .dark #static-splash img {
          filter: brightness(0) invert(1);
        }
        .dark #static-splash .spinner {
          border: 2.5px solid rgba(255, 255, 255, 0.1);
          border-top-color: #7EC850;
        }
      </style>
    </div>
    <script>
      // Safety: remove static splash after 5s even if React fails to mount
      setTimeout(function(){var s=document.getElementById('static-splash');if(s)s.remove();},5000);
      // Force new service worker to activate immediately
      if('serviceWorker' in navigator){navigator.serviceWorker.getRegistration().then(function(r){if(r&&r.waiting)r.waiting.postMessage({type:'SKIP_WAITING'})});}
    </script>
    <script type="module" src="/main.tsx?v=20250306-4"></script>
  </body>
</html>
